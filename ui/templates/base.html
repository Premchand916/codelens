<!-- ui/templates/base.html -->
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}CodeLens{% endblock %}</title>

    <!-- Tailwind CDN — no build step needed -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: '#22d3ee',      /* cyan-400 — our accent */
                        surface: '#0f172a',    /* slate-900 */
                        panel: '#1e293b',      /* slate-800 */
                        border: '#334155',     /* slate-700 */
                    },
                    fontFamily: {
                        mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
                    }
                }
            }
        }
    </script>

    <!-- HTMX — handles SSE without writing JS -->
    <!-- [SURFACE] HTMX: adds dynamic behavior via HTML attributes -->
    <!-- [INTERNAL] hx-ext="sse" opens EventSource, writes server tokens -->
    <!-- directly into DOM elements. No fetch() needed, no React. -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/sse.js"></script>

    <!-- JetBrains Mono for code feel -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'JetBrains Mono', monospace; }
        /* Streaming comment fade-in */
        .comment-card {
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-surface text-slate-300 min-h-screen">

    <!-- Navbar -->
    <nav class="border-b border-border px-6 py-4 flex items-center gap-3">
        <span class="text-brand font-semibold text-lg">◈ CodeLens</span>
        <span class="text-slate-600 text-sm">AI Code Review Agent</span>
    </nav>

    <!-- Page content -->
    <main class="max-w-3xl mx-auto px-6 py-10">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
